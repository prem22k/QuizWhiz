<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Request</title>
    <style>
        body { margin: 0; padding: 0; background-color: #050505; font-family: 'Courier New', monospace; }
        .container { max-width: 600px; margin: 0 auto; background-color: #0a0a0a; border: 1px solid #222; }
        .header { background-color: #111; padding: 24px; border-bottom: 2px solid #ccff00; }
        .header h1 { color: #ccff00; margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 3px; }
        .header p { color: #666; margin: 4px 0 0; font-size: 11px; text-transform: uppercase; }
        .body { padding: 24px; }
        .field { margin-bottom: 16px; }
        .field-label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
        .field-value { color: #fff; font-size: 14px; padding: 12px; background-color: #111; border: 1px solid #222; word-break: break-word; }
        .category-badge { display: inline-block; padding: 4px 12px; background-color: #ccff0020; color: #ccff00; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border: 1px solid #ccff0040; }
        .footer { padding: 16px 24px; border-top: 1px solid #222; text-align: center; }
        .footer p { color: #444; font-size: 10px; margin: 0; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>// Support Request</h1>
            <p>Customer Service Ticket</p>
        </div>
        <div class="body">
            <div class="field">
                <div class="field-label">From User</div>
                <div class="field-value">{{USER_NAME}}</div>
            </div>
            <div class="field">
                <div class="field-label">User Email</div>
                <div class="field-value">{{USER_EMAIL}}</div>
            </div>
            <div class="field">
                <div class="field-label">Category</div>
                <div class="field-value"><span class="category-badge">{{CATEGORY}}</span></div>
            </div>
            <div class="field">
                <div class="field-label">Subject</div>
                <div class="field-value">{{SUBJECT}}</div>
            </div>
            <div class="field">
                <div class="field-label">Message</div>
                <div class="field-value">{{MESSAGE}}</div>
            </div>
            <div class="field">
                <div class="field-label">Submitted At</div>
                <div class="field-value">{{TIMESTAMP}}</div>
            </div>
        </div>
        <div class="footer">
            <p>QuizWhiz Customer Service System</p>
        </div>
    </div>
</body>
</html>
